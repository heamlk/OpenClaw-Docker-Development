version: '3.8'

services:
  openclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-agent
    image: openclaw-agent:latest
    
    # Security: Non-root user (set in Dockerfile)
    user: "1000:1000"
    
    # Security: Read-only root filesystem
    read_only: true
    
    # Security: Temporary filesystem for /tmp
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    
    # Security: Drop all capabilities
    cap_drop:
      - ALL
    
    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    
    # Network configuration
    network_mode: bridge
    
    # Environment variables from .env file
    env_file:
      - .env
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Restart policy
    restart: unless-stopped
    
    # No volume mounts - complete isolation
    # volumes: []  # Explicitly empty - no host access
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
